name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        baseImage:
          [
            "mcr.microsoft.com/devcontainers/base:ubuntu",
          ]
    steps:
      - uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Ensure mount path exists for pi feature
        run: mkdir -p "${HOME}/.pi/agent"

      - name: "Testing 'pi' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f pi -i ${{ matrix.baseImage }} .

  test-scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Ensure mount path exists for pi feature
        run: mkdir -p "${HOME}/.pi/agent"

      - name: "Testing 'pi' scenarios"
        run: devcontainer features test -f pi --skip-autogenerated .
